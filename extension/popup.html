<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: Arial; }
    button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; }
    button.start { background: #28a745; color: white; }
    button.stop { background: #dc3545; color: white; }
    #status { margin-top: 10px; padding: 10px; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
  </style>
</head>
<body>
  <h3>Auto Submitter</h3>
  <button class="start" onclick="startAutomation()">Start Automation</button>
  <button class="stop" onclick="stopAutomation()">Stop Automation</button>
  <div id="status">Waiting...</div>

  <script src="popup.js"></script>
</body>
</html>
